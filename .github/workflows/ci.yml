name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck

      - name: Run shellcheck
        run: shellcheck scripts/**/*.sh

      - name: Verify module directory structure
        run: |
          for i in 0 1 2 3 4 5; do
            echo "Checking module-$i directory..."
            [ -d "module-$i" ] || { echo "module-$i/ missing"; exit 1; }
            [ -f "module-$i/.gitkeep" ] || [ -f "module-$i/STEPS.md" ] || { echo "module-$i has no content files"; exit 1; }
          done

      - name: Verify core files exist
        run: |
          for f in README.md LICENSE CONTRIBUTING.md CODE_OF_CONDUCT.md TEACHING_PROTOCOL.md AGENTS.md CLAUDE.md; do
            [ -f "$f" ] || { echo "Required file $f missing"; exit 1; }
          done
