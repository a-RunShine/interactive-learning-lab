schema: spec-driven

context: |
  Tech stack: Markdown (docs/teaching content)
  We use conventional commits (feat:, fix:, docs:, chore:)
  Domain: AI-agent-driven generic interactive teaching
  Primary audience: Chinese-speaking zero-basis learners
  Teaching protocol: teach-anything skill (`.opencode/skills/teach-anything/SKILL.md`)
  Agent guidance: AGENTS.md
  Branch naming: main (not master)

rules:
  proposal:
    - Keep proposals in Chinese
    - Use kebab-case for capability names
  specs:
    - Capabilities must have at least one scenario per requirement
    - Use SHALL/MUST for normative requirements
  tasks:
    - Each task must be a checkbox (- [ ])
    - Group tasks under ## numbered headings
    - Tasks should reference module numbers for context
