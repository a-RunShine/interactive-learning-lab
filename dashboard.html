<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>学习仪表盘</title>
<style>
:root {
  --color-bg: #fafbfc;
  --color-surface: #ffffff;
  --color-primary: #0f766e;
  --color-primary-dim: #ccfbf1;
  --color-text: #1e293b;
  --color-text-secondary: #64748b;
  --color-text-muted: #94a3b8;
  --color-border: #e2e8f0;
  --color-error: #dc2626;
  --color-error-dim: #fef2f2;
  --color-success: #16a34a;
  --color-success-dim: #f0fdf4;
  --shadow-sm: 0 1px 2px 0 rgba(0,0,0,0.04);
  --shadow-card: 0 0 0 1px rgba(0,0,0,0.03), 0 2px 4px rgba(0,0,0,0.04);
  --shadow-card-hover: 0 0 0 1px rgba(0,0,0,0.03), 0 8px 24px rgba(0,0,0,0.08);
  --radius: 12px;
  --radius-sm: 8px;
  --transition: 180ms ease;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
  background: var(--color-bg);
  color: var(--color-text);
  line-height: 1.6;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

.container {
  max-width: 960px;
  margin: 0 auto;
  padding: 56px 24px 64px;
}

.header {
  margin-bottom: 36px;
}

.header h1 {
  font-size: 1.75rem;
  font-weight: 700;
  letter-spacing: -0.025em;
  line-height: 1.2;
}

.stats-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 32px;
  flex-wrap: wrap;
}

.stat {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 20px 24px;
  box-shadow: var(--shadow-card);
  flex: 1 1 0;
  min-width: 140px;
}

.stat-value {
  font-size: 2rem;
  font-weight: 700;
  color: var(--color-primary);
  line-height: 1;
  letter-spacing: -0.02em;
}

.stat-label {
  font-size: 0.8125rem;
  color: var(--color-text-secondary);
  margin-top: 8px;
  font-weight: 500;
}

.filter-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
}

.filter-row h2 {
  font-size: 1.125rem;
  font-weight: 600;
  letter-spacing: -0.01em;
}

.filter-tabs {
  display: flex;
  gap: 2px;
  background: var(--color-border);
  border-radius: var(--radius-sm);
  padding: 2px;
}

.filter-tab {
  border: none;
  background: none;
  padding: 6px 14px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 0.8125rem;
  font-weight: 500;
  color: var(--color-text-secondary);
  transition: background var(--transition), color var(--transition);
  font-family: inherit;
}

.filter-tab:hover {
  color: var(--color-text);
}

.filter-tab.active {
  background: var(--color-surface);
  color: var(--color-text);
  box-shadow: 0 1px 2px rgba(0,0,0,0.06);
}

.sessions-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
  margin-bottom: 44px;
}

.session-card {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 22px 24px;
  box-shadow: var(--shadow-card);
  transition: box-shadow var(--transition), transform var(--transition);
}

.session-card:hover {
  box-shadow: var(--shadow-card-hover);
  transform: translateY(-1px);
}

.session-topic {
  font-size: 1.0625rem;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.session-date {
  font-size: 0.8125rem;
  color: var(--color-text-muted);
  margin-bottom: 18px;
}

.module-progress {
  margin-bottom: 14px;
}

.progress-header {
  display: flex;
  justify-content: space-between;
  margin-bottom: 6px;
  font-size: 0.8125rem;
  color: var(--color-text-secondary);
}

.progress-track {
  height: 5px;
  background: var(--color-border);
  border-radius: 3px;
  overflow: hidden;
}

.progress-fill {
  height: 100%;
  background: var(--color-primary);
  border-radius: 3px;
  transition: width 500ms ease;
}

.session-card-footer {
  display: flex;
  align-items: center;
  gap: 8px;
}

.error-indicator {
  font-size: 0.78125rem;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: 12px;
  display: inline-flex;
  align-items: center;
  gap: 4px;
}

.error-indicator.has-errors {
  background: var(--color-error-dim);
  color: var(--color-error);
}

.error-indicator.no-errors {
  background: var(--color-success-dim);
  color: var(--color-success);
}

.error-section {
  padding-top: 8px;
}

.error-section h2 {
  font-size: 1.125rem;
  font-weight: 600;
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}

.error-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.error-entry {
  background: var(--color-surface);
  border-radius: var(--radius);
  padding: 18px 22px;
  box-shadow: var(--shadow-card);
  border-left: 3px solid var(--color-error);
}

.error-head {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 10px;
}

.error-symbol {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--color-error);
  margin-top: 6px;
  flex-shrink: 0;
}

.error-head-text {
  flex: 1;
  min-width: 0;
}

.error-name {
  font-weight: 600;
  font-size: 0.9375rem;
  color: var(--color-error);
  line-height: 1.3;
  word-break: break-word;
}

.error-module {
  font-size: 0.8125rem;
  color: var(--color-text-muted);
  margin-top: 3px;
}

.error-meta-grid {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 5px 14px;
  font-size: 0.8125rem;
  line-height: 1.5;
}

.error-meta-label {
  color: var(--color-text-muted);
  font-weight: 500;
  white-space: nowrap;
}

.error-meta-value {
  color: var(--color-text);
  word-break: break-word;
}

.empty-state {
  grid-column: 1 / -1;
  text-align: center;
  padding: 72px 24px;
}

.empty-icon {
  width: 56px;
  height: 56px;
  margin: 0 auto 20px;
  border-radius: 50%;
  background: var(--color-primary-dim);
  display: flex;
  align-items: center;
  justify-content: center;
}

.empty-icon-inner {
  width: 20px;
  height: 20px;
  border: 2px solid var(--color-primary);
  border-radius: 3px;
  position: relative;
}

.empty-icon-inner::after {
  content: '';
  position: absolute;
  bottom: -6px;
  left: 50%;
  transform: translateX(-50%);
  width: 8px;
  height: 4px;
  border: 2px solid var(--color-primary);
  border-top: none;
  border-radius: 0 0 2px 2px;
}

.empty-state h3 {
  font-size: 1.0625rem;
  font-weight: 600;
  margin-bottom: 8px;
}

.empty-state p {
  font-size: 0.875rem;
  color: var(--color-text-secondary);
  max-width: 340px;
  margin: 0 auto;
  line-height: 1.7;
}

.no-results {
  text-align: center;
  padding: 48px 24px;
  color: var(--color-text-muted);
  grid-column: 1 / -1;
  font-size: 0.875rem;
}

.loading-state {
  text-align: center;
  padding: 72px 24px;
  color: var(--color-text-muted);
}

.error-state {
  text-align: center;
  padding: 72px 24px;
  color: var(--color-error);
}

@media (max-width: 640px) {
  .container { padding: 36px 16px 48px; }
  .header h1 { font-size: 1.5rem; }
  .stat-value { font-size: 1.5rem; }
  .sessions-grid { grid-template-columns: 1fr; }
  .filter-row { flex-direction: column; align-items: flex-start; gap: 12px; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <h1>学习仪表盘</h1>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="filter-row">
    <h2>学习历史</h2>
    <div class="filter-tabs" id="filterTabs">
      <button class="filter-tab active" data-filter="all">全部</button>
      <button class="filter-tab" data-filter="month">本月</button>
      <button class="filter-tab" data-filter="week">本周</button>
    </div>
  </div>

  <div class="sessions-grid" id="sessionsGrid"></div>

  <div class="error-section" id="errorSection" style="display:none">
    <h2>错误记录</h2>
    <div class="error-list" id="errorList"></div>
  </div>

</div>

<script>
(function () {
  var currentFilter = 'all';
  var allSessions = [];

  function $(id) { return document.getElementById(id); }

  function formatDate(dateStr) {
    var d = new Date(dateStr);
    return d.getFullYear() + '年' + (d.getMonth() + 1) + '月' + d.getDate() + '日';
  }

  function isInCurrentWeek(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    var dayOfWeek = now.getDay() || 7;
    var monday = new Date(now);
    monday.setDate(now.getDate() - dayOfWeek + 1);
    monday.setHours(0, 0, 0, 0);
    var sunday = new Date(monday);
    sunday.setDate(monday.getDate() + 6);
    sunday.setHours(23, 59, 59, 999);
    return d >= monday && d <= sunday;
  }

  function isInCurrentMonth(dateStr) {
    var d = new Date(dateStr);
    var now = new Date();
    return d.getFullYear() === now.getFullYear() && d.getMonth() === now.getMonth();
  }

  function filterSessions() {
    if (currentFilter === 'all') return allSessions;
    return allSessions.filter(function (s) {
      if (currentFilter === 'week') return isInCurrentWeek(s.date);
      if (currentFilter === 'month') return isInCurrentMonth(s.date);
      return true;
    });
  }

  function renderStats(sessions) {
    var totalTopics = sessions.length;
    var totalModules = 0;
    var completedModules = 0;
    var totalErrors = 0;
    sessions.forEach(function (s) {
      (s.modules || []).forEach(function (m) {
        totalModules++;
        if (m.completed) completedModules++;
      });
      totalErrors += (s.errors || []).length;
    });

    var stats = [
      { value: totalTopics, label: '累计学习主题' },
      { value: completedModules, label: '已完成模块' },
      { value: totalErrors, label: '记录错误' }
    ];

    $('statsBar').innerHTML = stats.map(function (s) {
      return '<div class="stat"><div class="stat-value">' + s.value + '</div><div class="stat-label">' + s.label + '</div></div>';
    }).join('');
  }

  function renderSessions(sessions) {
    var grid = $('sessionsGrid');

    if (sessions.length === 0) {
      if (allSessions.length === 0) {
        grid.innerHTML = '<div class="empty-state"><div class="empty-icon"><div class="empty-icon-inner"></div></div><h3>还没有学习记录</h3><p>开始一次教学吧！对 OpenCode 说「我想学…」，<br>教学结束后学习记录会自动出现在这里。</p></div>';
      } else {
        grid.innerHTML = '<div class="no-results">当前筛选条件下没有学习记录</div>';
      }
      return;
    }

    grid.innerHTML = sessions.map(function (session) {
      var modules = session.modules || [];
      var errors = session.errors || [];
      var completed = modules.filter(function (m) { return m.completed; }).length;
      var pct = modules.length > 0 ? Math.round((completed / modules.length) * 100) : 0;
      var errorCount = errors.length;

      var errorHtml = '';
      if (errorCount > 0) {
        errorHtml = '<span class="error-indicator has-errors">' + errorCount + ' 个错误</span>';
      } else {
        errorHtml = '<span class="error-indicator no-errors">无错误</span>';
      }

      var moduleNames = modules.map(function (m) { return m.name; }).join('、');

      return '<div class="session-card">'
        + '<div class="session-topic" title="' + session.topic + '">' + session.topic + '</div>'
        + '<div class="session-date">' + formatDate(session.date) + '</div>'
        + '<div class="module-progress">'
        + '<div class="progress-header"><span>' + completed + ' / ' + modules.length + ' 模块</span><span>' + (moduleNames || '无模块') + '</span></div>'
        + '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%"></div></div>'
        + '</div>'
        + '<div class="session-card-footer">' + errorHtml + '</div>'
        + '</div>';
    }).join('');
  }

  function renderErrors(sessions) {
    var allErrors = [];
    sessions.forEach(function (s) {
      (s.errors || []).forEach(function (e) {
        allErrors.push({ session: s.topic, date: s.date, error: e });
      });
    });

    var section = $('errorSection');
    var list = $('errorList');

    if (allErrors.length === 0) {
      section.style.display = 'none';
      return;
    }

    section.style.display = '';

    list.innerHTML = allErrors.map(function (item) {
      var e = item.error;
      return '<div class="error-entry">'
        + '<div class="error-head">'
        + '<div class="error-symbol"></div>'
        + '<div class="error-head-text">'
        + '<div class="error-name">' + (e.error || '未知错误') + '</div>'
        + '<div class="error-module">' + item.session + ' · ' + (e.module || '未指定模块') + '</div>'
        + '</div>'
        + '</div>'
        + '<div class="error-meta-grid">'
        + '<span class="error-meta-label">根因</span><span class="error-meta-value">' + (e.rootCause || '未记录') + '</span>'
        + '<span class="error-meta-label">修复</span><span class="error-meta-value">' + (e.resolution || '未记录') + '</span>'
        + '</div>'
        + '</div>';
    }).join('');
  }

  function render() {
    var filtered = filterSessions();
    renderStats(filtered);
    renderSessions(filtered);
    renderErrors(filtered);
  }

  function initFilters() {
    var tabs = $('filterTabs').querySelectorAll('.filter-tab');
    tabs.forEach(function (tab) {
      tab.addEventListener('click', function () {
        tabs.forEach(function (t) { t.classList.remove('active'); });
        tab.classList.add('active');
        currentFilter = tab.dataset.filter;
        render();
      });
    });
  }

  function loadData() {
    fetch('dashboard-data.json')
      .then(function (res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      })
      .then(function (data) {
        allSessions = (data && data.sessions) ? data.sessions : [];
        allSessions.sort(function (a, b) { return new Date(b.date) - new Date(a.date); });
        render();
      })
      .catch(function () {
        $('sessionsGrid').innerHTML = '<div class="empty-state"><div class="empty-icon"><div class="empty-icon-inner"></div></div><h3>还没有学习记录</h3><p>开始一次教学吧！对 OpenCode 说「我想学…」，<br>教学结束后学习记录会自动出现在这里。</p></div>';
        $('statsBar').innerHTML = '';
        $('errorSection').style.display = 'none';
      });
  }

  initFilters();
  loadData();
})();
</script>
</body>
</html>
